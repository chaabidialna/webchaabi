<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChaabi - The Home of Qacidattes</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-600 p-4">
        <div class="container mx-auto flex justify-between">
            <h1 class="text-white text-2xl">WebChaabi</h1>
            <div>
                <a href="#" class="text-white px-4">Home</a>
                <a href="#" class="text-white px-4">Catalog</a>
                <a href="#" class="text-white px-4">About</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <h2 class="text-3xl font-bold mt-8">Qacidattes Catalog</h2>
        <input type="text" placeholder="Search Poems..." class="mt-4 p-2 border border-gray-400 rounded w-full">

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">
            <!-- Sample Item for Featured Content -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h3 class="font-semibold">Featured Poem Title</h3>
                <p class="text-gray-600">Snippet or description of the featured poem.</p>
                <a href="#" class="text-blue-500">Read More</a>
            </div>
            <!-- Repeat similar blocks for all folders/collections -->
        </div>
    </main>

    <footer class="bg-gray-800 p-4 text-white text-center mt-8">
        <p>&copy; 2026 WebChaabi. All Rights Reserved.</p>
    </footer>
</body>
</html>
